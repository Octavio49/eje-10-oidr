<h1>Calculadora Basica</h1>
<label>Numero 1:</label><br>
<input type="number"[(ngModel)]="n1"/><br>
<label>Numero 2:</label><br>
<input type="number"[(ngModel)]="n2"/><br>
<label>Resultado: {{resultado}}</label><br>
<input type="button" value="Suma" (click)="sumar()"s>&nbsp;
<input type="button" value="Resta" (click)="restar()">&nbsp;
<input type="button" value="Multiplicación" (click)="multiplicar()">&nbsp;
<input type="button" value="Division" (click)="dividir()">&nbsp;
